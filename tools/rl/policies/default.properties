# Default baseline RL training config shared by driver profiles.
# Named profiles inherit these values and override only the values they want to change.

# Network body; observation and action layers are fixed by the game.
# Number of neurons in each hidden layer.
RL_HIDDEN_SIZE=512
# Number of hidden layers. Keep this at 2 unless there is a clear reason to retrain deeper models.
RL_HIDDEN_LAYERS=2
# Hidden-layer activation function used by RLlib/Torch.
RL_HIDDEN_ACTIVATION=tanh

# PPO/training throughput.
# PPO learning rate. Higher can learn faster but is less stable.
RL_LR=3e-4
# PPO entropy coefficient. Higher values keep exploration alive longer.
RL_ENTROPY_COEFF=0.005
# Discount factor. Higher values make the policy care more about future rewards.
RL_GAMMA=0.995
# Number of sampled environment steps used for each PPO training batch.
RL_TRAIN_BATCH_SIZE=16384
# Size of minibatches used inside each PPO optimization pass.
RL_MINIBATCH_SIZE=512
# Reuse each sampled batch conservatively. More passes overfit the subset of
# maps represented in one batch and caused cross-map policy regressions.
RL_NUM_EPOCHS=10
# Clip the global gradient norm so rare collision/projection outliers cannot
# dominate an update. This does not cap environment rewards.
RL_GRAD_CLIP=40.0
# Value updates must accommodate route returns that are much larger than Ray's
# default clip of 10.
RL_VF_CLIP_PARAM=100.0
# Number of physics frames repeated for each RL action.
RL_ACTION_REPEAT=4
# Number of Ray rollout workers sampling environments in parallel.
RL_WORKERS=8
# Bind local Ray worker RPC to loopback so Wi-Fi/VPN disconnects do not break
# worker communication.
RL_RAY_NODE_IP=127.0.0.1
# CPU budget exposed to Ray for scheduling workers.
RL_RAY_NUM_CPUS=8
# Seconds RLlib waits for slow workers before warning/timing out sampling.
RL_SAMPLE_TIMEOUT_S=600
# Heap bound for each embedded worker/evaluator JVM.
RL_JVM_MAX_HEAP=512m
# Save/evaluate a candidate every N iterations, so a good policy found mid-phase is kept.
RL_CHECKPOINT_EVERY=50
# Remote-worker reward summaries are expensive and mostly hidden; keep iteration/best-eval logs.
RL_NO_REWARD_SUMMARY=1

# Training schedule:
# - one learner car learns 5%, 10%, 15%, 20%, 25%, 50%, and 75% of a lap,
#   an easy lap on route-only masks, a lap on training masks, then a lap on
#   real game maps.
# Route-chunk stages use reusable saved random spawn seeds. Full-lap stages use
# fixed start positions.
RL_PRESET=curriculum
# Route curriculum. Percentages are fractions of a lap on the default maps;
# add "_real", for example "5%_real", to train that route chunk on assets/maps.
# Prefix a stage with a map id to train only that map, for example
# "map005_5%,map005_10%,map005"; a bare map id means one full lap on that map.
# "lap_easy" means a full lap on route-only easy masks, "lap_training" means
# a full lap on tools/rl/trainingMaps, and "lap_real" means a full lap on
# assets/maps.
RL_STAGE_ROUTE_TARGETS=5%_real,10%_real,25%_real,50%_real,75%_real,lap_real5

# Explicit per-stage iterations for 5%, 10%, 25%, 50%, 75%,
# easy lap, training lap, and real-map lap.
RL_STAGE_ITERATIONS=100,100,100,100,100,400
# Number of learner cars in each stage. Route-target stages must stay at 1
# because they use saved random route spawns; multi-car training is lap-only.
RL_STAGE_NUMBER_OF_CARS=1,1,1,1,1,1

# serious overnight
#RL_STAGE_ITERATIONS=100,100,100,100,150,200,300,400,400,800
#RL_STAGE_NUMBER_OF_CARS=1,1,1,1,1,1,1,1,1,4
# Finish after one pass through the staged curriculum.
RL_MAX_CYCLES=1
# Train on route training masks plus game maps; promote/evaluate on game maps.
RL_MAP_IDS=auto-all
RL_BEST_EVAL_MAP_IDS=auto-game

# Episode/runtime.
# Maximum RL actions before an episode ends if the target is not completed.
RL_MAX_ACTION_STEPS=19200
# End an attempt as a failed episode after 40 simulated seconds without moving
# at least half a car length forward along the route. 0 disables it.
RL_NO_PROGRESS_MAX_ACTION_STEPS=600
# A sustained stall is an environment failure, unlike the external episode time
# limit. This keeps stopping on the road from becoming safer than exploration.
RL_REWARD_NO_PROGRESS_PENALTY=50.0
# Potential-based shaping while near/outside the edge: moving toward safe road
# earns this multiplier and moving farther away loses the same amount.
RL_REWARD_OFF_ROAD_RECOVERY=4.0
# PPO controls the car for three seconds after it leaves the physical road. If
# it has not returned by then, finish the failed attempt instead of scripting it.
RL_OFF_ROAD_FAILURE_MAX_ACTION_STEPS=45
RL_REWARD_OFF_ROAD_FAILURE_PENALTY=50.0
# Route-target stages cap failed attempts shorter by default, matching best-eval:
# 5/10/25% use 4800 actions, 50% uses 7200, 75% uses 9600. Set to 0 to use
# RL_MAX_ACTION_STEPS for route-target training too, or a positive integer to
# force one explicit cap.
RL_ROUTE_TARGET_MAX_ACTION_STEPS=auto
# Profile launch mode:
# - 1 always trains from scratch.
# - 0 starts from assets/ai/policies/<profile>/rl_enemy_policy.json.
RL_FORCE_FRESH_START=0
# Internal RLlib checkpoint behavior. Profile training sets this automatically
# from RL_FORCE_FRESH_START; direct train_forever.sh runs can still override it.
RL_FRESH_START=1

# Evaluation/export.
# Number of evaluation episodes per map when deciding whether a policy is best.
RL_BEST_EVAL_EPISODES_PER_MAP=1
# "auto" keeps route-target evaluations short and uses full episode length for lap stages.
RL_BEST_EVAL_STEPS=auto
# Minimum average route targets is intentionally unset so each staged phase uses
# its own target.
# 1 exports the latest policy on finish/interrupt even if best-eval promotion did not happen.
# Keep this disabled so rejected candidates cannot overwrite the last promoted model.
RL_FORCE_EXPORT_ON_FINISH=0
# Rebuild/package cadence after training cycles. 0 disables repeated packaging.
RL_PACKAGE_EVERY_CYCLES=0

# Rewards.
# Shared fast-lap baseline. Individual profile slots may override it.
# Small negative reward every step to encourage efficient driving.
RL_REWARD_STEP_PENALTY=0.050
# Multiplier for signed progress along the route. Positive progress gets an
# uncapped speed-shaped bonus in-game, while route targets remain objectives only.
RL_REWARD_PROGRESS=1.00
# Multiplier for sustained, on-road drifting progress. Uninterrupted drifts ramp to 3x.
# 0 disables drift rewards.
RL_REWARD_DRIFT=0.0
# Penalty multiplier for steering magnitude; higher values encourage smoother driving.
RL_REWARD_STEERING_PENALTY=0.012
# Reverse speed below this value is ignored, so braking/settling is not punished.
RL_REWARD_REVERSE_FREE_EPSILON=0.20
# Penalty per unit of real reverse speed above RL_REWARD_REVERSE_FREE_EPSILON.
RL_REWARD_REVERSE_PENALTY_PER_UNIT=0.14
# Maximum reverse-speed penalty per step.
RL_REWARD_REVERSE_MAX_PENALTY=1.20
# Penalty per newly detected car hit/contact.
RL_REWARD_CAR_PUSH_PENALTY=2.8
# Maximum car-hit penalty per step.
RL_REWARD_CAR_PUSH_MAX_STEP_PENALTY=8.0
# Base penalty for being outside the road.
RL_REWARD_OFF_ROAD_PENALTY=1.25
# Extra off-road penalty scaled by distance from the road.
RL_REWARD_OFF_ROAD_DISTANCE_PENALTY=0.32
# Maximum off-road penalty per step.
RL_REWARD_OFF_ROAD_MAX_PENALTY=7.2
