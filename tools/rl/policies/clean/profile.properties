# Clean - tuned to avoid slow crawl/recovery on long checkpoint gaps.
DRIVER_SALARY=7800
DRIVER_REPAIR_RISK=low

# Qualifier was too happy with slow incremental progress. Keep dense progress
# reward, but make the actual checkpoint crossing and the time cost matter more.
RL_REWARD_PROGRESS=2.00
RL_REWARD_CHECKPOINT=45.0
RL_REWARD_STEP_PENALTY=0.035

# Discourage the stop/rotate/reverse recovery pattern seen on train000.
RL_REWARD_STEERING_PENALTY=0.025
RL_REWARD_REVERSE_PENALTY_PER_UNIT=0.14
RL_REWARD_REVERSE_MAX_PENALTY=1.20

# Clean should prefer staying on the road instead of accepting messy recovery.
RL_REWARD_OFF_ROAD_PENALTY=1.20
RL_REWARD_OFF_ROAD_DISTANCE_PENALTY=0.30
RL_REWARD_OFF_ROAD_MAX_PENALTY=7.0
