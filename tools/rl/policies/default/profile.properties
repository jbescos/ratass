# Default baseline RL training config from before driver profiles.
# Named profiles inherit these values and override only the values they want to change.

# Network body; observation and action layers are fixed by the game.
# Number of neurons in each hidden layer.
RL_HIDDEN_SIZE=384
# Number of hidden layers. Keep this at 2 unless there is a clear reason to retrain deeper models.
RL_HIDDEN_LAYERS=2
# Hidden-layer activation function used by RLlib/Torch.
RL_HIDDEN_ACTIVATION=tanh

# PPO/training throughput.
# PPO learning rate. Higher can learn faster but is less stable.
RL_LR=3e-4
# Discount factor. Higher values make the policy care more about future rewards.
RL_GAMMA=0.995
# Number of sampled environment steps used for each PPO training batch.
RL_TRAIN_BATCH_SIZE=4096
# Size of minibatches used inside each PPO optimization pass.
RL_MINIBATCH_SIZE=512
# Number of physics frames repeated for each RL action.
RL_ACTION_REPEAT=4
# Number of Ray rollout workers sampling environments in parallel.
RL_WORKERS=7
# CPU budget exposed to Ray for scheduling workers.
RL_RAY_NUM_CPUS=8
# Seconds RLlib waits for slow workers before warning/timing out sampling.
RL_SAMPLE_TIMEOUT_S=600
# Save/evaluate a candidate every N iterations, so a good policy found mid-phase is kept.
RL_CHECKPOINT_EVERY=25
# Remote-worker reward summaries are expensive and mostly hidden; keep iteration/best-eval logs.
RL_NO_REWARD_SUMMARY=1

# Training schedule:
# - one learner car learns 1 route chunk, 2 route chunks, 3 route chunks,
#   an easy lap on route-only masks, then a normal lap.
# - profiles train alone; no opponent/enemy stage is run.
# Route-chunk stages use reusable saved random spawn seeds. Full-lap stages use
# fixed start positions.
RL_PRESET=curriculum
# Route curriculum. Percentages are fractions of a lap, "lap_easy" means a
# full lap on route-only easy masks, and "lap" means a full normal circuit.
RL_STAGE_ROUTE_TARGETS=25%,50%,75%,lap_easy,lap

# Explicit per-stage iterations for 1 route target, 2 route targets, 3 route targets,
# easy lap, and normal lap.
RL_STAGE_ITERATIONS=80,100,100,100,150
# Documents the sum of RL_STAGE_ITERATIONS for the single-car curriculum block.
RL_TRAINING_CAR_ITERATIONS=530

# serious overnight
#RL_STAGE_ITERATIONS=150,200,300,400,800
#RL_TRAINING_CAR_ITERATIONS=1850

# Total cars per curriculum block. Keep this at 1 to train without enemies.
RL_TRAINING_CAR_STAGES=1
RL_TRAINING_CAR_MAX_CYCLES=1
# Finish after one pass through the staged curriculum.
RL_MAX_CYCLES=1
# Train on route training masks plus game maps; promote/evaluate on game maps.
RL_MAP_IDS=auto-all
RL_BEST_EVAL_MAP_IDS=auto-game

# Episode/runtime.
# Maximum RL actions before an episode ends if the target is not completed.
RL_MAX_ACTION_STEPS=6400
# 1 deletes the old RLlib checkpoint directory before training; 0 resumes if possible.
RL_FRESH_START=1

# Evaluation/export.
# Number of evaluation episodes per map when deciding whether a policy is best.
RL_BEST_EVAL_EPISODES_PER_MAP=1
# "auto" keeps route-target evaluations short and uses full episode length for lap stages.
RL_BEST_EVAL_STEPS=auto
# Minimum average route targets is intentionally unset so each staged phase uses
# its own target.
# 1 exports the latest policy on finish/interrupt even if best-eval promotion did not happen.
RL_FORCE_EXPORT_ON_FINISH=1
# Rebuild/package cadence after training cycles. 0 disables repeated packaging.
RL_PACKAGE_EVERY_CYCLES=0

# Rewards.
# Fast-lap baseline. Named profiles keep close to the aggressive reference and
# only vary the speed/step pressure slightly.
# Small negative reward every step to encourage efficient driving.
RL_REWARD_STEP_PENALTY=0.052
# Multiplier for signed progress along the route.
RL_REWARD_PROGRESS=2.25
# Small positive reward for forward speed, normalized by each car's top speed.
RL_REWARD_SPEED=0.135
# Reward for completing a route target chunk or lap.
RL_REWARD_ROUTE_TARGET=45.0
# Penalty multiplier for steering magnitude; higher values encourage smoother driving.
RL_REWARD_STEERING_PENALTY=0.012
# Reverse speed below this value is ignored, so braking/settling is not punished.
RL_REWARD_REVERSE_FREE_EPSILON=0.20
# Penalty per unit of real reverse speed above RL_REWARD_REVERSE_FREE_EPSILON.
RL_REWARD_REVERSE_PENALTY_PER_UNIT=0.14
# Maximum reverse-speed penalty per step.
RL_REWARD_REVERSE_MAX_PENALTY=1.20
# Penalty per newly detected car hit/contact.
RL_REWARD_CAR_PUSH_PENALTY=2.8
# Maximum car-hit penalty per step.
RL_REWARD_CAR_PUSH_MAX_STEP_PENALTY=8.0
# Base penalty for being outside the road.
RL_REWARD_OFF_ROAD_PENALTY=1.25
# Extra off-road penalty scaled by distance from the road.
RL_REWARD_OFF_ROAD_DISTANCE_PENALTY=0.32
# Maximum off-road penalty per step.
RL_REWARD_OFF_ROAD_MAX_PENALTY=7.2
